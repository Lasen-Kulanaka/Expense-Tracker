<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Expense Tracker</h1>

      <div class="tabs">
        <button id="loginTab" class="tab-btn active">Login</button>
        <button id="signupTab" class="tab-btn">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Log In</button>
      </form>

      <!-- SIGNUP FORM (hidden by default) -->
      <form id="signupForm" class="hidden">
        <input type="text" id="signupName" placeholder="Full Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
        <button type="submit">Sign Up</button>
      </form>

      <p id="authMessage" class="message"></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
